name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
    
    - name: Install dependencies
      run: flutter pub get
      working-directory: mobile_app/frontend
    
    - name: Build iOS IPA
      run: |
        cd mobile_app/frontend
        flutter build ipa --release --no-codesign
        ls -la build/ios/ipa/
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v3
      with:
        name: ios-ipa
        path: mobile_app/frontend/build/ios/ipa/*.ipa
