server {
    listen 80;
    server_name chaseqiu.top www.chaseqiu.top ai656.top www.ai656.top api.ai656.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chaseqiu.top www.chaseqiu.top ai656.top www.ai656.top api.ai656.top;

    ssl_certificate /etc/letsencrypt/live/ai656.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai656.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /opt/personal-website/frontend;
    index index.html;

    # 根路径 - 个人网站
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Webapp移动端
    location /webapp/ {
        alias /opt/personal-website/frontend/webapp/;
        try_files $uri $uri/ /webapp/index.html;
        expires 1d;
        add_header Cache-Control "public";
    }

    # 下载服务
    location /download/ {
        alias /opt/personal-website/frontend/download/;
        index index.html;
        try_files $uri $uri/ /download/index.html;
    }

    # 钱包备份服务（客服端用）
    location /api/wallet/backup {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/wallet/restore {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/wallet/list {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/wallet/delete {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/admin/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 钱包API服务（移动端和电脑端通用）
    location /api/ {
        # CORS 配置
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
