server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ai656.top www.ai656.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name ai656.top www.ai656.top;

    ssl_certificate /etc/letsencrypt/live/ai656.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai656.top/privkey.pem;

    root /opt/personal-website/frontend;
    index index.html;

    # 根路径
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API服务
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Webapp移动端
    location /webapp/ {
        alias /opt/personal-website/frontend/webapp/;
        try_files $uri $uri/ /webapp/index.html;
        expires 1d;
        add_header Cache-Control "public";
    }

    # 下载服务
    location /download/ {
        alias /opt/personal-website/frontend/download/;
        index index.html;
        try_files $uri $uri/ /download/index.html;
    }
}
