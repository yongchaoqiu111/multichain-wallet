name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'
        channel: 'stable'
    
    - name: Install dependencies
      run: flutter pub get
      working-directory: mobile_app/frontend
    
    - name: Build iOS IPA
      run: |
        cd mobile_app/frontend
        flutter build ipa --release --no-codesign 2>&1 | tee build.log
        echo "=== Build Output ==="
        echo "Looking for IPA files..."
        find build -name "*.ipa" -o -name "*.app" || echo "No IPA/App found"
        ls -la build/ios/ipa/ 2>/dev/null || echo "ipa directory not found"
        ls -la build/ios/ 2>/dev/null || echo "ios directory not found"
        cat build.log
    
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: mobile_app/frontend/build/ios/ipa/*.ipa
